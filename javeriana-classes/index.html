function baseState(){let s={};[...sis,...mus].forEach(c=>s[c[0]]=c[7]==='taken'?'taken':'');return s}function baseCredits(){let c={};mus.forEach(x=>c[x[0]]=x[4]||'');return c}function fromHash(){try{if(location.hash.startsWith('#s='))return JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(3)))))}catch(e){}return null}function load(){let h=fromHash();if(h){localStorage.setItem(KEY,JSON.stringify(h));return h}let raw=localStorage.getItem(KEY);if(raw){try{return JSON.parse(raw)}catch(e){}}let o={state:baseState(),credits:baseCredits()};localStorage.setItem(KEY,JSON.stringify(o));return o}let store=load();if(!store.state)store={state:baseState(),credits:baseCredits()};if(!store.credits)store.credits=baseCredits();function save(msg='Guardado'){localStorage.setItem(KEY,JSON.stringify(store));document.getElementById('saveState').textContent=msg}function list(){return program==='sis'?sis:mus}function label(v){return v==='taken'?'Tomada':v==='planned'?'Tomará':'Pendiente'}function crVal(c){if(program==='sis')return Number(c[4])||0;return Number(store.credits[c[0]])||0}function updateSummary(){let tc=0,tcr=0,pc=0,pcr=0;list().forEach(c=>{let st=store.state[c[0]]||'',cr=crVal(c);if(st==='taken'){tc++;tcr+=cr}if(st==='planned'){pc++;pcr+=cr}});takenCount.textContent=tc;takenCredits.textContent=tcr;planCount.textContent=pc;planCredits.textContent=pcr}

rá</button></div></td><td class="name">${c[1]}</td><td class="desc">${c[2]}</td><td class="work">${c[3]}</td>${tail}`;tb.appendChild(tr)});empty.style.display=shown?'none':'block';updateSummary()}
document.addEventListener('click',e=>{let t=e.target.closest('.tab');if(t){program=t.dataset.program;filter='all';document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));document.querySelector('[data-filter="all"]').classList.add('on');render()}let b=e.target.closest('.toggle');if(b){let id=b.dataset.id,val=b.dataset.val;store.state[id]=store.state[id]===val?'':val;save();render()}let chip=e.target.closest('.chip');if(chip){document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));chip.classList.add('on');filter=chip.dataset.filter;render()}});
document.addEventListener('input',e=>{if(e.target.id==='search'){q=e.target.value.toLowerCase().trim();render()}if(e.target.classList.contains('creditInput')){store.credits[e.target.dataset.crid]=e.target.value.replace(/[^0-9.]/g,'');save();updateSummary()}});clearAll.onclick=()=>{store={state:{},credits:baseCredits()};[...sis,...mus].forEach(c=>store.state[c[0]]='');save();history.replaceState(null,'',location.pathname);render()};resetBase.onclick=()=>{store={state:baseState(),credits:baseCredits()};save();history.replaceState(null,'',location.pathname);render()};copyLink.onclick=async()=>{let packed=btoa(unescape(encodeURIComponent(JSON.stringify(store))));history.replaceState(null,'','#s='+packed);try{await navigator.clipboard.writeText(location.href);save('Link copiado')}catch(e){save('Link listo')}};csv.onclick=()=>{let rows=[['programa','estado','clase','descripcion','ejemplos','creditos','anio_enfoque','semestre_requisito','fuente_nota']];[['sis',sis],['mus',mus]].forEach(([p,arr])=>arr.forEach(c=>rows.push([p,label(store.state[c[0]]||''),c[1],c[2],c[3],p==='sis'?c[4]:(store.credits[c[0]]||''),p==='sis'?c[5]:c[5],p==='sis'?c[6]:c[6],p==='sis'?c[8]:c[7]])));let out=rows.map(r=>r.map(x=>'"'+String(x).replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'text/csv'}));a.download='javeriana_clases.csv';a.click()};render();
